<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GT | Full Stack Dev</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body {
            background: #0a0a0a;
            color: #00ff00;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: #151515;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 255, 0, 0.1);
            width: 350px;
            text-align: center;
            border: 1px solid #333;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid #00ff00;
            margin-bottom: 15px;
            object-fit: cover;
        }

        h1 { font-size: 1.8rem; margin: 10px 0; }
        p { color: #888; margin-bottom: 20px; }

        .skills { margin-bottom: 25px; }
        .badge {
            background: #222;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.8rem;
            margin: 3px;
            display: inline-block;
            border: 1px solid #444;
        }

        .social-links a {
            color: #00ff00;
            font-size: 1.8rem;
            margin: 0 15px;
            text-decoration: none;
            transition: 0.3s;
        }

        .social-links a:hover {
            color: #fff;
            transform: translateY(-5px);
        }

        .contact-btn {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 10px 25px;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="profile.jpg" alt="GT" class="profile-img">
        <h1>GOVINTHAN (GT)</h1>
        <p>Full Stack Developer | Age: 20</p>

        <div class="skills">
            <span class="badge">HTML</span>
            <span class="badge">CSS</span>
            <span class="badge">JavaScript</span>
            <span class="badge">GitHub</span>
        </div>

        <div class="social-links">
            <a href="https://www.instagram.com/one.soul.only?igsh=MWs3ZmFkdnc2N2I1dg==" target="_blank">
                <i class="fab fa-instagram"></i>
            </a>
            <a href="https://github.com/arugovind6-create" target="_blank">
                <i class="fab fa-github"></i>
            </a>
        </div>

        <button class="contact-btn" onclick="alert('Message Sent!')">Contact Me</button>
    </div>

</body>
</html>
